# Автоматизация: проверка сборки фронтенда при каждом push/PR в main
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  marketscope-frontend:
    name: MarketScope (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mark/MarketScope

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mark/MarketScope/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Сборка без секретов: плейсхолдеры допустимы (см. src/lib/supabase.ts)
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketscope-dist
          path: mark/MarketScope/dist
          retention-days: 7

  marketscoup-python:
    name: marketscoup (Python smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import package & CLI
        run: |
          PYTHONPATH=. python -c "import marketscoup; print('marketscoup import ok')"
          PYTHONPATH=. python -m marketscoup.cli --help
