# Автодеплой микросервиса ms-v2 на прод VPS (Beget) по SSH.
# Срабатывает при push в main, если менялся код бэкенда или файлы деплоя.
# Можно запустить вручную через "Run workflow" (workflow_dispatch).
name: Deploy ms-v2 (VPS)

on:
  push:
    branches: [main]
    paths:
      - "backend/ms-v2/**"
      - "deploy/beget/**"
      - ".github/workflows/deploy-ms-v2.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ms-v2
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
    steps:
      - name: Check deploy secrets
        id: check
        run: |
          if [ -z "${VPS_HOST}" ]; then
            echo "::notice::Секреты VPS не заданы (VPS_HOST пуст). Деплой пропущен."
            echo "Добавьте VPS_HOST, VPS_USER, VPS_SSH_KEY в Settings → Secrets and variables → Actions, чтобы включить автодеплой."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.check.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: "30m"
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="${APP_DIR:-/opt/marketscope}"
            cd "$APP_DIR"
            APP_DIR="$APP_DIR" GIT_REF="main" bash deploy/beget/deploy.sh
