version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    command: uvicorn service.app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    volumes:
      # CSV монтируется с хоста — можно обновлять без пересборки образа
      - ./final_blyat_v3.csv:/app/final_blyat_v3.csv:ro
      # Папка с результатами задач
      - jobs_data:/app/jobs
    command: bash service/worker_start.sh
    # Chrome использует /dev/shm для рендеринга; 2 GB — запас
    shm_size: "2gb"

volumes:
  redis_data:
  jobs_data:
